<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Luxor: Ancient Magic Coins</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Philosopher&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000;
            font-family: 'Philosopher', sans-serif; cursor: none;
        }

        .tomb {
            position: relative; width: 100vw; height: 100vh;
            background: url('3.png') center/cover no-repeat;
            background-color: #050505;
        }

        #game-canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 250; }

        #scarab-cursor {
            position: fixed; width: 80px; height: 80px;
            background: url('1.png') center/contain no-repeat;
            pointer-events: none; z-index: 1000;
            filter: drop-shadow(0 0 15px #ffd700);
            transform: translate(-50%, -50%);
            animation: hoverFloat 2s ease-in-out infinite;
            display: none;
        }
        
        @keyframes hoverFloat {
            0%, 100% { margin-top: 0px; }
            50% { margin-top: -10px; }
        }

        #start-btn {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px 60px; font-size: 30px; cursor: pointer;
            background: linear-gradient(#ffd700, #b8860b);
            border: 3px solid #5c4306; color: #1a1403; border-radius: 8px;
            font-family: 'Cinzel Decorative'; font-weight: bold;
            z-index: 3000; transition: 0.3s;
        }

        .volume-ctrl {
            position: absolute; top: 20px; right: 20px;
            z-index: 2000; display: flex; align-items: center; gap: 10px;
            background: rgba(0,0,0,0.8); padding: 12px 20px; border-radius: 30px;
            border: 2px solid #ffd700; pointer-events: auto;
        }
        input[type=range] { cursor: pointer; accent-color: #ffd700; width: 130px; vertical-align: middle; }

        .word-tablet {
            position: absolute; width: 180px; padding: 12px;
            background: linear-gradient(135deg, #d4af37 0%, #ffd700 50%, #8a6d1c 100%);
            border: 2px solid #fff3ad; border-radius: 6px; color: #1a1403;
            text-align: center; font-size: 24px; z-index: 300;
            box-shadow: 0 10px 20px rgba(0,0,0,0.7);
            display: flex; flex-direction: column; align-items: center;
            box-sizing: border-box; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .artifact-coin {
            width: 45px; height: 45px; margin-top: 8px;
            background: url('2.png') center/contain no-repeat;
            filter: drop-shadow(0 0 5px rgba(255,215,0,0.5));
        }
        
        .active-coin {
            animation: coinSpin 1.2s linear infinite;
            filter: brightness(1.2) drop-shadow(0 0 12px #ffd700);
        }

        @keyframes coinSpin {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        .flying-artifact {
            position: fixed; width: 50px; height: 50px;
            background: url('2.png') center/contain no-repeat;
            z-index: 3000; pointer-events: none;
            animation: coinSpin 0.6s linear infinite;
            transition: all 1s cubic-bezier(0.6, -0.28, 0.735, 0.045);
        }

        #flash-effect {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2000; pointer-events: none; opacity: 0; background: white;
        }
        .shock-anim { animation: flashFlash 0.4s ease-out; }
        @keyframes flashFlash { 0% { opacity: 0.5; } 100% { opacity: 0; } }

        .ui-top {
            position: absolute; top: 25px; width: 100%;
            display: flex; flex-direction: column; align-items: center; z-index: 500;
        }
        .slots { display: flex; gap: 8px; justify-content: center; }
        .slot {
            width: 55px; height: 55px; border: 2px solid #ffd700;
            background: rgba(0,0,0,0.8); border-radius: 8px; display: flex; align-items: center; justify-content: center;
        }

        .modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 480px; padding: 40px; background: radial-gradient(circle, #2c1f01 0%, #000 100%);
            border: 4px solid #ffd700; color: #ffd700; text-align: center;
            z-index: 4000; display: none;
        }
    </style>
</head>
<body oncontextmenu="return false;">

<button id="start-btn" onclick="startGame()">BEGIN</button>

<div class="volume-ctrl" onmouseover="this.style.cursor='default'">
    <span style="color: #ffd700; font-size: 18px;">🔊</span>
    <input type="range" id="vol-slider" min="0" max="1" step="0.01" value="0.5" oninput="changeVol(this.value)">
</div>

<div id="scarab-cursor"></div>
<canvas id="game-canvas"></canvas>
<div id="flash-effect"></div>

<div class="tomb">
    <div id="ui-container" style="display: none;">
        <div class="ui-top">
            <div class="slots" id="slots-box"></div>
            <p id="level-counter" style="color:#ffd700; font-size:16px; margin-top:10px; font-weight: bold; text-shadow: 2px 2px 4px #000;">Ancient Magic Coin 1 of 10</p>
        </div>
        <div id="words-layer"></div>
    </div>

    <div id="victory-modal" class="modal">
        <h1 style="font-family:'Cinzel Decorative'; font-size: 38px;">LEGENDARY!</h1>
        <p style="font-size: 18px; color: #fff;">You have collected all 10 Ancient Magic Coins for the Scarab!</p>
        <button onclick="location.reload()" style="margin-top: 25px; padding:15px 35px; cursor:pointer; background:linear-gradient(#ffd700, #b8860b); border:none; font-family:'Cinzel Decorative'; font-weight:bold; color: #1a1403;">Play Again</button>
    </div>
</div>

<script>
    const sndCorrect = new Audio('1.mp3');
    const sndWrong = new Audio('2.mp3');
    const sndLevelComplete = new Audio('3.mp3');
    const sndVictory = new Audio('4.mp3');
    const playlist = [sndCorrect, sndWrong, sndLevelComplete, sndVictory];

    // Глобальная функция смены громкости (теперь точно работает)
    function changeVol(v) {
        playlist.forEach(s => { s.volume = v; });
    }

    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    const scarab = document.getElementById('scarab-cursor');
    const flash = document.getElementById('flash-effect');
    
    const sentences = [
        ["Ra", "is", "the", "Sun", "God"], ["The", "Solar", "Barque", "is", "golden"],
        ["Khepri", "is", "a", "sacred", "scarab"], ["The", "scarab", "rolls", "the", "Sun"],
        ["Pyramids", "are", "filled", "with", "power"], ["The", "Ankh", "gives", "eternal", "life"],
        ["Apophis", "is", "the", "Great", "Serpent"], ["His", "eyes", "burn", "like", "fire"],
        ["The", "Serpent", "hates", "the", "light"], ["Magic", "protects", "the", "ancient", "tomb"]
    ];

    let currentSentenceIndex = 0, nextWordIndex = 0, activeCoins = [];
    let mouseX = 0, mouseY = 0, lastX = 0, isTransitioning = false, gameStarted = false;

    function startGame() {
        document.getElementById('start-btn').style.display = 'none';
        document.getElementById('ui-container').style.display = 'block';
        scarab.style.display = 'block';
        gameStarted = true;
        changeVol(document.getElementById('vol-slider').value);
        initGame();
    }

    function initGame() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const slotsBox = document.getElementById('slots-box');
        slotsBox.innerHTML = '';
        for(let i=0; i<sentences.length; i++) slotsBox.innerHTML += `<div class="slot" id="slot-${i}"></div>`;
        loadSentence();
    }

    function loadSentence() {
        if (currentSentenceIndex >= sentences.length) return;
        document.getElementById('level-counter').innerText = `Ancient Magic Coin ${currentSentenceIndex + 1} of 10`;
        const layer = document.getElementById('words-layer');
        layer.innerHTML = ''; activeCoins = []; nextWordIndex = 0; isTransitioning = false;

        const words = sentences[currentSentenceIndex];
        const shuffled = [...words].sort(() => Math.random() - 0.5);

        const cols = 3; const rows = 2;
        let cellIndices = Array.from(Array(cols * rows).keys()).sort(() => Math.random() - 0.5);

        const marginX = window.innerWidth * 0.15;
        const marginY = 220;
        const cellW = (window.innerWidth - (marginX * 2)) / cols;
        const cellH = (window.innerHeight - marginY - 100) / rows;

        shuffled.forEach((word, index) => {
            const cellIndex = cellIndices[index];
            const col = cellIndex % cols;
            const row = Math.floor(cellIndex / cols);
            
            // "Хаотичность" — случайное смещение и поворот
            const jitterX = (Math.random() - 0.5) * 70;
            const jitterY = (Math.random() - 0.5) * 50;
            const randRot = (Math.random() - 0.5) * 12;

            const tab = document.createElement('div');
            tab.className = 'word-tablet';
            tab.style.left = (marginX + (col * cellW) + (cellW / 2) - 90 + jitterX) + 'px';
            tab.style.top = (marginY + (row * cellH) + (cellH / 2) - 40 + jitterY) + 'px';
            tab.style.transform = `rotate(${randRot}deg)`;
            tab.dataset.baseRot = randRot;

            tab.innerHTML = `<span>${word}</span><div class="artifact-coin"></div>`;
            layer.appendChild(tab);

            activeCoins.push({
                text: word, targetIndex: words.indexOf(word),
                el: tab.querySelector('.artifact-coin'), parentTab: tab, collected: false
            });
        });
    }

    window.addEventListener('mousemove', (e) => {
        if (!gameStarted) return;
        const tilt = Math.min(Math.max((e.clientX - lastX) * 3, -30), 30);
        scarab.style.transform = `translate(-50%, -50%) rotate(${tilt}deg)`;
        lastX = e.clientX; mouseX = e.clientX; mouseY = e.clientY;
        scarab.style.left = mouseX + 'px'; scarab.style.top = mouseY + 'px';
        if (!isTransitioning) checkCollisions();
    });

    function checkCollisions() {
        activeCoins.forEach(coin => {
            const rect = coin.el.getBoundingClientRect();
            const cx = rect.left + rect.width/2;
            const cy = rect.top + rect.height/2;
            const dist = Math.hypot(mouseX - cx, mouseY - cy);
            const baseRot = coin.parentTab.dataset.baseRot;

            if (dist < 100) coin.parentTab.style.transform = `scale(1.1) translateY(-8px) rotate(${baseRot}deg)`;
            else coin.parentTab.style.transform = `scale(1) rotate(${baseRot}deg)`;

            if (!coin.collected && dist < 40) {
                if (coin.targetIndex === nextWordIndex) {
                    sndCorrect.currentTime = 0; sndCorrect.play();
                    coin.collected = true; 
                    coin.el.classList.add('active-coin');
                    nextWordIndex++;
                    if (nextWordIndex === sentences[currentSentenceIndex].length) {
                        isTransitioning = true; 
                        setTimeout(() => animateToSlot(coin), 300);
                    }
                } else if (nextWordIndex > 0) {
                    sndWrong.currentTime = 0; sndWrong.play();
                    flash.classList.add('shock-anim');
                    setTimeout(() => flash.classList.remove('shock-anim'), 400);
                    nextWordIndex = 0;
                    activeCoins.forEach(c => { c.collected = false; c.el.classList.remove('active-coin'); });
                }
            }
        });
    }

    function animateToSlot(lastCoin) {
        sndLevelComplete.currentTime = 0; sndLevelComplete.play();
        const slot = document.getElementById(`slot-${currentSentenceIndex}`);
        const sRect = slot.getBoundingClientRect();
        const cRect = lastCoin.el.getBoundingClientRect();

        const flyer = document.createElement('div');
        flyer.className = 'flying-artifact';
        flyer.style.left = cRect.left + 'px'; flyer.style.top = cRect.top + 'px';
        document.body.appendChild(flyer);

        setTimeout(() => {
            flyer.style.left = (sRect.left + 2) + 'px'; 
            flyer.style.top = (sRect.top + 2) + 'px';
        }, 50);

        setTimeout(() => {
            flyer.remove();
            slot.innerHTML = '<div class="artifact-coin active-coin" style="margin:0; width:42px; height:42px;"></div>';
            currentSentenceIndex++;
            if (currentSentenceIndex < sentences.length) {
                setTimeout(loadSentence, 500);
            } else { 
                sndVictory.play(); 
                document.getElementById('victory-modal').style.display = 'block'; 
            }
        }, 1000);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (gameStarted) {
            const collected = activeCoins.filter(c => c.collected).sort((a,b) => a.targetIndex - b.targetIndex);
            if (collected.length > 0) {
                ctx.beginPath();
                const r0 = collected[0].el.getBoundingClientRect();
                ctx.moveTo(r0.left + 22, r0.top + 22);
                for (let i = 1; i < collected.length; i++) {
                    const ri = collected[i].el.getBoundingClientRect();
                    ctx.lineTo(ri.left + 22, ri.top + 22);
                }
                if (!isTransitioning) ctx.lineTo(mouseX, mouseY);
                ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 6;
                ctx.shadowBlur = 15; ctx.shadowColor = '#ffd700';
                ctx.lineCap = 'round';
                ctx.stroke();
            }
        }
        requestAnimationFrame(draw);
    }
    window.onresize = initGame;
    draw();
</script>
</body>
</html>
